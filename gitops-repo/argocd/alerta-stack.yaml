apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerta-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/steevivo/gitmcp.git
    targetRevision: main
    path: gitops-repo/manifests/alerta
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
