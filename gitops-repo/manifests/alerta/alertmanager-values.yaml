# version: 1.0.0
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = critical"]
        target_matchers: ["severity =~ warning|info"]
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = warning"]
        target_matchers: ["severity = info"]
      - equal: ["namespace"]
        source_matchers: ["alertname = InfoInhibitor"]
        target_matchers: ["severity = info"]
      - target_matchers: ["alertname = InfoInhibitor"]
    route:
      receiver: 'alerta'
      group_by: ['namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: 'null'
    receivers:
      - name: 'null'
      - name: 'alerta'
        webhook_configs:
          - url: 'http://alerta-server.monitoring.svc.cluster.local:8080/api/webhooks/prometheus'
            send_resolved: true
