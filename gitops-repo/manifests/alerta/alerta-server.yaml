apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerta-server
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerta-server
  template:
    metadata:
      labels:
        app: alerta-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h alerta-postgres-rw -p 5432; do sleep 2; done
      containers:
        - name: alerta-server
          image: alerta/alerta:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: alerta-server-secret
          readinessProbe:
            httpGet:
              path: /api/config
              port: 8080
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /api/config
              port: 8080
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: alerta-server
  namespace: monitoring
spec:
  selector:
    app: alerta-server
  ports:
    - port: 8080
      targetPort: 8080
